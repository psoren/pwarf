name: Hourly Digest

on:
  schedule:
    # Runs every 5 minutes; script skips if fewer than 5 PRs have accumulated
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: 'How far back to look for merged PRs (minutes). Default: 65. Use a large number (e.g. 525600) for a full-history run.'
        required: false
        default: '65'

permissions:
  contents: write
  models: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # BOT_GITHUB_TOKEN is a PAT from an admin account; required because
          # GITHUB_TOKEN can't bypass the "typecheck-and-test" required status check
          # on direct pushes to main. The PAT works when "Include administrators"
          # is unchecked in branch protection settings.
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and build sim
        run: |
          npm ci
          npm run build --workspace=shared
          npm run build --workspace=sim

      - name: Generate and commit digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_MINUTES: ${{ github.event.inputs.lookback_minutes }}
        run: node .github/scripts/hourly-digest.mjs
