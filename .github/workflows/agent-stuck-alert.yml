name: Agent Stuck Alert

on:
  issues:
    types: [labeled]

jobs:
  notify:
    if: github.event.label.name == 'needs-human-review'
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"text":"🚨 Agent needs help: ${{ github.event.issue.title }}\n${{ github.event.issue.html_url }}"}'
