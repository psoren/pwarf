name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review: true
          review_context: |
            Review this PR against docs/CONVENTIONS.md and docs/ARCHITECTURE.md.

            Check:
            1. Module boundary rules are respected (no cross-layer imports)
            2. ECS conventions followed (one component per file, pure systems)
            3. No browser APIs in core/map/entities/systems
            4. Tests exist and cover the acceptance criteria from the linked issue
            5. All exported functions have explicit return types
            6. No `any` without an explanatory comment
            7. Side stores cleaned up in exitQuery if added in enterQuery

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
