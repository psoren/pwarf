name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'blog/**'

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        name: Typecheck all workspaces
      - name: Verify clean rebuild (catch stale .d.ts cache)
        run: |
          rm -rf shared/dist sim/dist
          npm run build --workspace=shared
          npm run build --workspace=sim
          npm run build --workspace=app
      - run: npm test
        name: Run tests
      - run: node scripts/check-migrations.mjs
        name: Check migration file sequence
